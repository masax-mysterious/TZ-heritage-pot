<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏺 Tanzanian Heritage Pot | Pure Clay Artifact</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #03060f; }
        #info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            color: #ffefbf;
            padding: 10px 20px;
            border-radius: 36px;
            font-size: 14px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
            border-left: 5px solid #f4a261;
            font-family: monospace;
        }
        .controls-note {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.65);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            color: #ffd98c;
            font-family: monospace;
            pointer-events: none;
            backdrop-filter: blur(8px);
            z-index: 10;
        }
        @media (max-width: 700px) {
            #info { font-size: 10px; padding: 6px 14px; bottom: 16px; left: 16px; }
            .controls-note { font-size: 9px; top: 12px; right: 12px; }
        }
    </style>
</head>
<body>
    <div id="info">
        🏺 TANZANIAN HERITAGE POT • 🇹🇿 Flag Colors • Inside & Outside
    </div>
    <div class="controls-note">
        🖱️ Drag to rotate • Scroll / Pinch to zoom
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- setup scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020512);
        scene.fog = new THREE.FogExp2(0x020512, 0.0004);

        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3.0, 1.4, 5.2);
        camera.lookAt(0, 0.5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- OrbitControls with smooth zoom & rotation
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.07;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0.5, 0);
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;
        
        controls.addEventListener('start', () => { controls.autoRotate = false; });
        controls.addEventListener('end', () => { setTimeout(() => { controls.autoRotate = true; }, 3000); });

        // ========== THICK, CLOSED POT SHAPE (LatheGeometry) ==========
        // Start at radius 0 to close the bottom, then expand into a full clay pot
        const points = [];
        // Bottom (closed)
        points.push(new THREE.Vector2(0.00, -1.05));   // center tip
        points.push(new THREE.Vector2(0.38, -1.02));
        points.push(new THREE.Vector2(0.68, -0.94));
        points.push(new THREE.Vector2(0.92, -0.80));  // lower body
        points.push(new THREE.Vector2(1.10, -0.58));  // wide belly
        points.push(new THREE.Vector2(1.18, -0.35));
        points.push(new THREE.Vector2(1.20, -0.12));  // maximum width
        points.push(new THREE.Vector2(1.14, 0.10));
        points.push(new THREE.Vector2(1.02, 0.28));   // upper belly
        points.push(new THREE.Vector2(0.88, 0.42));   // neck start
        points.push(new THREE.Vector2(0.72, 0.52));   // narrow neck
        points.push(new THREE.Vector2(0.64, 0.62));   // flaring lip
        points.push(new THREE.Vector2(0.74, 0.72));   // rim outer
        points.push(new THREE.Vector2(0.90, 0.78));   // top rim
        points.push(new THREE.Vector2(0.94, 0.80));   // final edge
        
        const potGeometry = new THREE.LatheGeometry(points, 128);
        potGeometry.computeVertexNormals();
        
        // --- Create vibrant texture: Tanzanian flag (green, yellow, black, blue) + tribal patterns
        const canvasTex = document.createElement('canvas');
        canvasTex.width = 2048;
        canvasTex.height = 1024;
        const ctx = canvasTex.getContext('2d');
        
        // Base green (land)
        ctx.fillStyle = '#1A6B3A';
        ctx.fillRect(0, 0, canvasTex.width, canvasTex.height);
        
        // Yellow diagonal band
        ctx.beginPath();
        ctx.moveTo(0, canvasTex.height * 0.70);
        ctx.lineTo(canvasTex.width * 0.44, canvasTex.height);
        ctx.lineTo(canvasTex.width * 0.64, canvasTex.height);
        ctx.lineTo(canvasTex.width * 0.20, canvasTex.height * 0.70);
        ctx.fillStyle = '#F2C94C';
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(canvasTex.width * 0.48, 0);
        ctx.lineTo(canvasTex.width * 0.80, canvasTex.height * 0.34);
        ctx.lineTo(canvasTex.width, canvasTex.height * 0.14);
        ctx.lineTo(canvasTex.width, 0);
        ctx.fill();
        
        // Black diagonal band (people)
        ctx.beginPath();
        ctx.moveTo(0, canvasTex.height * 0.72);
        ctx.lineTo(canvasTex.width * 0.42, canvasTex.height);
        ctx.lineTo(canvasTex.width * 0.66, canvasTex.height);
        ctx.lineTo(canvasTex.width * 0.22, canvasTex.height * 0.72);
        ctx.fillStyle = '#1E1E1E';
        ctx.fill();
        
        // Blue patterns (ocean)
        ctx.fillStyle = '#0F52BA';
        for (let w = 0; w < 280; w++) {
            ctx.beginPath();
            ctx.ellipse(Math.random() * canvasTex.width, Math.random() * canvasTex.height * 0.45, 22 + Math.random() * 55, 12 + Math.random() * 30, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Traditional Makonde & Tingatinga motifs
        ctx.fillStyle = '#FFD966';
        for (let i = 0; i < 2800; i++) {
            ctx.beginPath();
            ctx.arc(Math.random() * canvasTex.width, Math.random() * canvasTex.height, 2.5 + Math.random() * 9, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Pottery carving lines
        ctx.strokeStyle = '#E8B85A';
        ctx.lineWidth = 5;
        for (let s = 0; s < 700; s++) {
            ctx.beginPath();
            ctx.moveTo(Math.random() * canvasTex.width, Math.random() * canvasTex.height);
            ctx.lineTo(Math.random() * canvasTex.width, Math.random() * canvasTex.height);
            ctx.stroke();
        }
        
        // Swahili text
        ctx.font = "Bold 76px 'Poppins'";
        ctx.fillStyle = '#FFF0B5';
        ctx.fillText("🇹🇿 TANZANIA", canvasTex.width - 620, 150);
        ctx.font = "42px monospace";
        ctx.fillStyle = "#FEDB7A";
        ctx.fillText("UTAMADUNI • SANAA • UMOJA", 140, 980);
        ctx.font = "32px monospace";
        ctx.fillStyle = "#FFDA7C";
        ctx.fillText("MAKONDE • MAASAI • TINGATINGA", 110, 910);
        
        const potTexture = new THREE.CanvasTexture(canvasTex);
        potTexture.wrapS = THREE.RepeatWrapping;
        potTexture.wrapT = THREE.RepeatWrapping;
        
        // DOUBLE-SIDED material so the inside of the pot is visible and painted
        const potMaterial = new THREE.MeshStandardMaterial({
            map: potTexture,
            side: THREE.DoubleSide,   // inside & outside show the pattern
            roughness: 0.35,
            metalness: 0.08,
            emissive: new THREE.Color(0x2A1E0C),
            emissiveIntensity: 0.08
        });
        
        const pot = new THREE.Mesh(potGeometry, potMaterial);
        pot.castShadow = true;
        pot.receiveShadow = false;
        pot.position.y = -0.08;
        scene.add(pot);
        
        // --- Atmospheric glow around pot (very subtle)
        const haloGeo = new THREE.SphereGeometry(1.34, 56, 56);
        const haloMat = new THREE.MeshPhongMaterial({ color: 0xffbb77, emissive: 0x331c00, transparent: true, opacity: 0.08, side: THREE.BackSide });
        const atmosphere = new THREE.Mesh(haloGeo, haloMat);
        atmosphere.position.y = 0.25;
        scene.add(atmosphere);
        
        // --- Starfield background
        const starGeo = new THREE.BufferGeometry();
        const starCount = 5000;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 750;
            starPositions[i*3+1] = (Math.random() - 0.5) * 450;
            starPositions[i*3+2] = (Math.random() - 0.5) * 220 - 100;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xfff5dd, size: 0.13, transparent: true, blending: THREE.AdditiveBlending }));
        scene.add(stars);
        
        // --- Floating bead particles (ambient, flag colors: green, yellow, blue)
        const beadCount = 5500;
        const beadGeoObj = new THREE.BufferGeometry();
        const beadPositions = new Float32Array(beadCount * 3);
        const beadColors = new Float32Array(beadCount * 3);
        for (let i = 0; i < beadCount; i++) {
            const radius = 1.35 + Math.random() * 0.8;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const z = radius * Math.sin(phi) * Math.sin(theta);
            const y = (Math.random() - 0.5) * 2.1;
            beadPositions[i*3] = x;
            beadPositions[i*3+1] = y + 0.25;
            beadPositions[i*3+2] = z;
            const choice = Math.random();
            if (choice < 0.34) { beadColors[i*3]=0.18; beadColors[i*3+1]=0.72; beadColors[i*3+2]=0.28; }   // green
            else if (choice < 0.67) { beadColors[i*3]=1.0; beadColors[i*3+1]=0.84; beadColors[i*3+2]=0.22; } // yellow
            else { beadColors[i*3]=0.10; beadColors[i*3+1]=0.44; beadColors[i*3+2]=0.98; } // blue
        }
        beadGeoObj.setAttribute('position', new THREE.BufferAttribute(beadPositions, 3));
        beadGeoObj.setAttribute('color', new THREE.BufferAttribute(beadColors, 3));
        const beadPoints = new THREE.Points(beadGeoObj, new THREE.PointsMaterial({ size: 0.01, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending }));
        scene.add(beadPoints);
        
        // --- Subtle ground shadow disc
        const groundDisc = new THREE.Mesh(
            new THREE.CircleGeometry(2.8, 16),
            new THREE.MeshStandardMaterial({ color: 0x111511, roughness: 0.9, metalness: 0.05, transparent: true, opacity: 0.25 })
        );
        groundDisc.rotation.x = -Math.PI / 2;
        groundDisc.position.y = -1.08;
        groundDisc.receiveShadow = true;
        scene.add(groundDisc);
        
        // --- Lighting: Warm African sunlight
        const mainLight = new THREE.DirectionalLight(0xffdd99, 1.35);
        mainLight.position.set(2.5, 3.2, 1.8);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        
        const ambientLight = new THREE.AmbientLight(0x443322, 0.7);
        scene.add(ambientLight);
        
        const fillWarm = new THREE.PointLight(0xdd8844, 0.65);
        fillWarm.position.set(-1.8, 1.0, -1.6);
        scene.add(fillWarm);
        
        const rimLight = new THREE.PointLight(0x6699ff, 0.45);
        rimLight.position.set(1.3, 1.0, -2.2);
        scene.add(rimLight);
        
        const backFill = new THREE.PointLight(0xffaa66, 0.55);
        backFill.position.set(0, 1.2, -2.7);
        scene.add(backFill);
        
        // --- Simple animation for floating beads and stars
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            controls.update();
            
            // Gentle rotation for stars and beads
            stars.rotation.y += 0.0002;
            stars.rotation.x += 0.0001;
            beadPoints.rotation.y += 0.0002;
            atmosphere.rotation.y += 0.00015;
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('✅ Pure Tanzanian pot — closed bottom, double-sided painting, no markers, only heritage.');
    </script>
</body>
</html>
